<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Doku rounded mark</title>
  <desc id="desc">Rounded minimalist black geometric D paper-fold mark.</desc>

  <!-- Main rounded D / paper outline -->
  <path
    d="M122 132 H275 L378 235 V285 C378 353 326 407 260 407 H122 Z"
    fill="none"
    stroke="#000000"
    stroke-width="58"
    stroke-linejoin="round"
    stroke-linecap="round"/>

  <!-- Rounded paper fold cue -->
  <path
    d="M275 132 V214 H356"
    fill="none"
    stroke="#000000"
    stroke-width="58"
    stroke-linejoin="round"
    stroke-linecap="round"/>

  <!-- Soft negative cut to make the fold lighter/open -->
  <path
    d="M276 167 L330 221 H276 Z"
    fill="#FFFFFF"/>
</svg>
